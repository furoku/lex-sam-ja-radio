<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>V1 Midnight Vinyl · Lex × Sam</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/furoku/lex-sam-ja-radio@main/player.js" disabled />
  <style>
    :root {
      --bg0:#07090e; --text:#eef2ff; --muted:#9aa6bf;
      --accent:#7dd3fc; --accent2:#a78bfa; --line:rgba(255,255,255,.08); --ok:#34d399;
    }
    *{box-sizing:border-box} body{margin:0;min-height:100%;font-family:"SF Pro Display","Hiragino Sans","Noto Sans JP",sans-serif;color:var(--text);
      background:radial-gradient(1000px 500px at 10% -10%,rgba(125,211,252,.18),transparent 55%),radial-gradient(800px 400px at 100% 0,rgba(167,139,250,.15),transparent 50%),linear-gradient(180deg,#0a0c12,#05070a)}
    .nav{display:flex;gap:8px;flex-wrap:wrap;padding:16px 18px 0;max-width:920px;margin:0 auto}
    .nav a{color:var(--muted);text-decoration:none;font-size:12px;padding:6px 10px;border:1px solid var(--line);border-radius:999px}
    .nav a.on{color:#081018;background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;font-weight:700}
    .wrap{max-width:920px;margin:0 auto;padding:18px 18px 80px}
    .badge{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:7px 12px;background:rgba(255,255,255,.03)}
    .live{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:p 1.8s infinite}
    @keyframes p{70%{box-shadow:0 0 0 10px transparent}}
    .card{margin-top:14px;background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:28px;box-shadow:0 24px 80px rgba(0,0,0,.55);overflow:hidden;backdrop-filter:blur(12px)}
    .hero{display:grid;grid-template-columns:170px 1fr;gap:22px;padding:26px;border-bottom:1px solid var(--line)}
    @media(max-width:700px){.hero{grid-template-columns:1fr;text-align:center}}
    .vinyl{width:170px;height:170px;margin:0 auto;border-radius:50%;position:relative;
      background:radial-gradient(circle at 50% 50%,#222 0 14%,transparent 15%),repeating-radial-gradient(circle at 50% 50%,#111 0 2px,#1b1b1b 2px 4px,#0e0e0e 4px 6px);
      box-shadow:inset 0 0 0 10px rgba(0,0,0,.35),0 18px 40px rgba(0,0,0,.45)}
    .vinyl.spin{animation:spin 4.5s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .vinyl::after{content:"";position:absolute;inset:28%;border-radius:50%;background:linear-gradient(135deg,#7dd3fc,#a78bfa 55%,#f472b6)}
    .vlabel{position:absolute;inset:0;display:grid;place-items:center;z-index:2;font-weight:800;font-size:13px;color:#0b1020}
    h1{margin:0 0 8px;font-size:clamp(1.35rem,3vw,1.9rem)}
    .sub{margin:0 0 12px;color:var(--muted);font-size:14px;line-height:1.6}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
    .player{padding:22px 26px 26px}
    .now{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}
    .now-title{font-weight:700}.now-meta{color:var(--muted);font-size:12px}
    .progress-wrap{height:10px;border-radius:999px;background:rgba(255,255,255,.08);cursor:pointer;overflow:hidden;margin-bottom:8px}
    .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));position:relative}
    .progress-fill::after{content:"";position:absolute;right:-1px;top:50%;width:14px;height:14px;transform:translateY(-50%);border-radius:50%;background:#fff;box-shadow:0 0 0 4px rgba(125,211,252,.25)}
    .times{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-bottom:16px;font-variant-numeric:tabular-nums}
    .controls{display:flex;justify-content:center;align-items:center;gap:14px;margin-bottom:16px}
    button{font:inherit;color:inherit;border:0;cursor:pointer;background:transparent}
    .btn{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.06);border:1px solid var(--line)}
    .btn.main{width:72px;height:72px;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#081018;border:0;font-size:26px;box-shadow:0 12px 30px rgba(125,211,252,.25)}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:13px}
    select,input[type=range]{accent-color:var(--accent)} select{background:#1a2030;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:6px 8px}
    .mode{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0 8px;padding:4px;border-radius:14px;background:rgba(0,0,0,.25);border:1px solid var(--line)}
    .mode button{padding:10px;border-radius:11px;color:var(--muted);font-weight:600;font-size:13px}
    .mode button.active{background:rgba(255,255,255,.08);color:var(--text)}
    .chapters{display:grid;gap:8px;max-height:340px;overflow:auto}
    .ch{display:grid;grid-template-columns:44px 1fr auto;gap:12px;align-items:center;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.03);text-align:left;border:1px solid transparent}
    .ch.active{border-color:rgba(125,211,252,.35);background:linear-gradient(90deg,rgba(125,211,252,.12),rgba(167,139,250,.08))}
    .ch-num{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:13px;background:rgba(255,255,255,.06);color:var(--muted)}
    .ch.active .ch-num{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#081018}
    .ch-title{font-size:14px;font-weight:650}.ch-sub,.ch-dur{font-size:12px;color:var(--muted)}
    .eq{display:flex;align-items:flex-end;gap:3px;height:16px}.eq span{width:3px;border-radius:2px;background:var(--accent);animation:eq 1s ease-in-out infinite;height:40%}
    .eq span:nth-child(2){animation-delay:.15s;height:70%}.eq span:nth-child(3){animation-delay:.3s;height:50%}.eq span:nth-child(4){animation-delay:.45s;height:90%}
    @keyframes eq{0%,100%{transform:scaleY(.4);opacity:.6}50%{transform:scaleY(1);opacity:1}}
    .eq.paused span{animation:none;height:25%!important;opacity:.35}
  </style>
</head>
<body>
  <div class="nav">
    <a href="./">Hub</a>
    <a class="on" href="v1-midnight.html">V1 Midnight</a>
    <a href="v2-studio.html">V2 Studio</a>
    <a href="v3-terminal.html">V3 Terminal</a>
  </div>
  <div class="wrap">
    <span class="badge"><span class="live"></span> ON AIR · Midnight Vinyl</span>
    <div class="card">
      <div class="hero">
        <div class="vinyl" id="vinyl"><div class="vlabel">#367</div></div>
        <div>
          <h1>Lex Fridman × Sam Altman</h1>
          <p class="sub">深夜のネオン・レコード局。ガラスカードに回るヴァイナルと、シアン〜紫の光。</p>
          <div class="chips"><span class="chip">Lex · orion</span><span class="chip">Sam · helios</span><span class="chip">約2h18m</span></div>
        </div>
      </div>
      <div class="player">
        <div class="now"><div class="now-title" id="nowTitle">フル通し</div><div class="now-meta" id="nowMeta">準備中</div></div>
        <div class="progress-wrap" id="seek"><div class="progress-fill" id="bar"></div></div>
        <div class="times"><span id="cur">0:00</span><span id="dur">--:--</span></div>
        <div class="controls">
          <button class="btn" id="prev">⏮</button>
          <button class="btn" id="back15">−15</button>
          <button class="btn main" id="play">▶</button>
          <button class="btn" id="fwd15">+15</button>
          <button class="btn" id="next">⏭</button>
        </div>
        <div class="row">
          <div>
            <label>速度 <select id="speed"><option value="0.9">0.9×</option><option value="1" selected>1.0×</option><option value="1.1">1.1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option></select></label>
            <label style="margin-left:12px">音量 <input id="vol" type="range" min="0" max="1" step="0.01" value="1" /></label>
          </div>
          <div class="eq paused" id="eq"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="mode"><button class="active" id="modeFull">📻 フル通し</button><button id="modeCh">📚 チャプター</button></div>
        <div class="chapters" id="chapters" hidden></div>
      </div>
    </div>
  </div>
  <audio id="audio" preload="metadata"></audio>
  <script src="player.js"></script>
  <script>initLexRadio();</script>
</body>
</html>
